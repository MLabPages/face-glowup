<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>垢抜けレシピ(端末内解析)</title>
<link rel="stylesheet" href="styles.css" />

<main class="wrap">
  <header class="head">
    <h1>垢抜けレシピ</h1>
    <p class="lead">
      写真から、前髪・眉・光・表情の小さな整え方を提案します。<br />
      <strong>写真は端末の外に送りません。</strong>解析はブラウザ内で完結します。
    </p>
  </header>

  <section class="stage" id="stage">
    <div class="preview" id="preview">
      <video id="video" playsinline muted hidden></video>
      <canvas id="canvas" hidden></canvas>
      <canvas id="overlay" hidden></canvas>
      <div class="placeholder" id="placeholder">
        <div class="ph-icon">📷</div>
        <p>カメラを起動するか、写真を選んでください</p>
      </div>
    </div>

    <div class="controls">
      <button id="startCam" class="btn primary">カメラを起動</button>
      <button id="shoot" class="btn" hidden>この顔で解析</button>
      <button id="stopCam" class="btn ghost" hidden>カメラを止める</button>

      <label class="btn file">
        写真を選ぶ
        <input id="file" type="file" accept="image/*" hidden />
      </label>

      <button id="retry" class="btn ghost" hidden>もう一度</button>
      <button id="savePhoto" class="btn" hidden>写真を保存</button>
      <button id="sharePhoto" class="btn" hidden>共有</button>
    </div>

    <p class="status" id="status" role="status" aria-live="polite">準備中…モデルを読み込んでいます</p>
  </section>

  <section class="result" id="result" hidden>
    <h2>あなたの垢抜けレシピ</h2>
    <p class="disclaimer">
      採点ではなく、今の雰囲気を活かすための小さな提案です。気になるものだけ試してください。
    </p>

    <div class="cards" id="impression"></div>

    <div class="tips-head">
      <h3>今日試すなら</h3>
    </div>
    <ul class="tips" id="tips"></ul>
  </section>

  <footer class="foot">
    <p>プライバシー方針:映像・写真は保存も送信もしません。数値特徴のみ端末内で計算します。</p>
  </footer>
</main>

<script type="module" src="app.js"></script>
